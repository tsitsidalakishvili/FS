groups:
  - name: deliberation-api-alerts
    rules:
      - alert: DeliberationApiDown
        expr: up{job="deliberation-api"} == 0
        for: 2m
        labels:
          severity: critical
          service: deliberation-api
        annotations:
          summary: "Deliberation API is down"
          description: "Prometheus cannot scrape the deliberation-api target for at least 2 minutes."

      - alert: DeliberationApiHigh5xxRate
        expr: |
          (
            sum(rate(deliberation_http_requests_total{status_code=~"5.."}[5m]))
            /
            clamp_min(sum(rate(deliberation_http_requests_total[5m])), 1)
          ) > 0.05
        for: 10m
        labels:
          severity: warning
          service: deliberation-api
        annotations:
          summary: "Deliberation API 5xx error rate is high"
          description: "5xx responses are above 5% for 10 minutes."

      - alert: DeliberationApiHighP95Latency
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(deliberation_http_request_latency_seconds_bucket[5m])) by (le)
          ) > 1.5
        for: 10m
        labels:
          severity: warning
          service: deliberation-api
        annotations:
          summary: "Deliberation API p95 latency is high"
          description: "p95 request latency has been above 1.5s for 10 minutes."
