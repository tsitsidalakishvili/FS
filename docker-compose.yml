version: "3.9"

services:
  neo4j:
    image: neo4j:5.26
    restart: unless-stopped
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-change_me}"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD:-change_me} 'RETURN 1;' || exit 1",
        ]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  deliberation-api:
    build:
      context: ./deliberation/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "${NEO4J_USER:-neo4j}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-change_me}"
      NEO4J_DATABASE: "${NEO4J_DATABASE:-neo4j}"
      REDIS_URL: "redis://redis:6379/0"
      REDIS_CACHE_TTL_SECONDS: "${REDIS_CACHE_TTL_SECONDS:-30}"
      SENTRY_DSN: "${SENTRY_DSN:-}"
      DELIBERATION_SENTRY_DSN: "${DELIBERATION_SENTRY_DSN:-}"
      SENTRY_ENVIRONMENT: "${SENTRY_ENVIRONMENT:-development}"
      SENTRY_TRACES_SAMPLE_RATE: "${SENTRY_TRACES_SAMPLE_RATE:-0.0}"
      SENTRY_PROFILES_SAMPLE_RATE: "${SENTRY_PROFILES_SAMPLE_RATE:-0.0}"
      APP_RELEASE: "${APP_RELEASE:-local}"
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8010:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/readyz', timeout=3)",
        ]
      interval: 30s
      timeout: 8s
      retries: 5
      start_period: 25s

  crm:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      DELIBERATION_API_URL: "http://deliberation-api:8000"
      DELIBERATION_API_TIMEOUT_S: "${DELIBERATION_API_TIMEOUT_S:-20}"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "${NEO4J_USER:-neo4j}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-change_me}"
      NEO4J_DATABASE: "${NEO4J_DATABASE:-neo4j}"
      PUBLIC_ONLY: "${PUBLIC_ONLY:-false}"
      SUPPORTER_ACCESS_CODE: "${SUPPORTER_ACCESS_CODE:-}"
      SENTRY_DSN: "${SENTRY_DSN:-}"
      CRM_SENTRY_DSN: "${CRM_SENTRY_DSN:-}"
      SENTRY_ENVIRONMENT: "${SENTRY_ENVIRONMENT:-development}"
      SENTRY_TRACES_SAMPLE_RATE: "${SENTRY_TRACES_SAMPLE_RATE:-0.0}"
      SENTRY_PROFILES_SAMPLE_RATE: "${SENTRY_PROFILES_SAMPLE_RATE:-0.0}"
      APP_RELEASE: "${APP_RELEASE:-local}"
    depends_on:
      deliberation-api:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    ports:
      - "8501:8501"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=3)",
        ]
      interval: 30s
      timeout: 8s
      retries: 5
      start_period: 30s

  prometheus:
    image: prom/prometheus:v3.5.0
    profiles: ["monitoring"]
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
    depends_on:
      deliberation-api:
        condition: service_healthy
    ports:
      - "9090:9090"

  alertmanager:
    image: prom/alertmanager:v0.28.1
    profiles: ["monitoring"]
    restart: unless-stopped
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    ports:
      - "9093:9093"

volumes:
  neo4j_data:
  neo4j_logs:
  redis_data:
  prometheus_data:
